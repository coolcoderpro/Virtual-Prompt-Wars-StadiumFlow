<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#0f172a">StadiumFlow Architecture</text>
  <text x="550" y="62" text-anchor="middle" font-size="13" fill="#64748b">Data flow from simulator to real-time UI</text>

  <!-- ============ SCRIPTS LAYER (Left) ============ -->
  <text x="130" y="105" text-anchor="middle" font-size="14" font-weight="600" fill="#7c3aed">Scripts (Node.js / Server-side)</text>

  <!-- Seed Script -->
  <rect x="30" y="120" width="200" height="70" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">npm run seed</text>
  <text x="130" y="167" text-anchor="middle" font-size="11" fill="#6d28d9">seeds venue, sections,</text>
  <text x="130" y="181" text-anchor="middle" font-size="11" fill="#6d28d9">POIs into Firestore</text>

  <!-- Simulator -->
  <rect x="30" y="210" width="200" height="70" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="238" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">npm run simulate</text>
  <text x="130" y="257" text-anchor="middle" font-size="11" fill="#6d28d9">updates crowdLevel &amp;</text>
  <text x="130" y="271" text-anchor="middle" font-size="11" fill="#6d28d9">waitMinutes every few sec</text>

  <!-- Service Account box -->
  <rect x="50" y="310" width="160" height="45" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="130" y="333" text-anchor="middle" font-size="11" font-weight="600" fill="#a16207">service-account.json</text>
  <text x="130" y="348" text-anchor="middle" font-size="10" fill="#a16207">Firebase Admin SDK</text>

  <!-- Arrow: service account to seed/simulate -->
  <line x1="130" y1="310" x2="130" y2="280" stroke="#ca8a04" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ============ FIREBASE (Center) ============ -->
  <text x="500" y="105" text-anchor="middle" font-size="14" font-weight="600" fill="#f97316">Firebase (Cloud)</text>

  <!-- Firestore Box -->
  <rect x="380" y="120" width="240" height="240" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="148" text-anchor="middle" font-size="15" font-weight="700" fill="#c2410c">Cloud Firestore</text>

  <!-- Collections -->
  <rect x="400" y="162" width="200" height="35" rx="6" fill="#ffedd5" stroke="#fb923c" stroke-width="1"/>
  <text x="500" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#c2410c">venues/{venueId}</text>

  <rect x="400" y="205" width="200" height="35" rx="6" fill="#ffedd5" stroke="#fb923c" stroke-width="1"/>
  <text x="500" y="227" text-anchor="middle" font-size="12" font-weight="600" fill="#c2410c">venues/{id}/sections</text>

  <rect x="400" y="248" width="200" height="35" rx="6" fill="#ffedd5" stroke="#fb923c" stroke-width="1"/>
  <text x="500" y="270" text-anchor="middle" font-size="12" font-weight="600" fill="#c2410c">venues/{id}/pois</text>

  <!-- POI fields -->
  <text x="500" y="300" text-anchor="middle" font-size="10" fill="#9a3412">crowdLevel: 0-3</text>
  <text x="500" y="314" text-anchor="middle" font-size="10" fill="#9a3412">waitMinutes, location, type</text>

  <!-- Firestore Rules -->
  <rect x="400" y="328" width="200" height="25" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="500" y="345" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">firestore.rules: read-only clients</text>

  <!-- Arrows: Scripts to Firestore -->
  <line x1="230" y1="155" x2="370" y2="180" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="230" y1="245" x2="370" y2="265" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="195" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="600">WRITE</text>

  <!-- ============ NEXT.JS APP (Right) ============ -->
  <text x="870" y="105" text-anchor="middle" font-size="14" font-weight="600" fill="#3b82f6">Next.js App (Browser)</text>

  <!-- App container -->
  <rect x="720" y="120" width="340" height="320" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>

  <!-- Firestore Hooks -->
  <rect x="740" y="135" width="140" height="55" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="810" y="157" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">firestoreHooks.ts</text>
  <text x="810" y="173" text-anchor="middle" font-size="10" fill="#2563eb">onSnapshot listeners</text>
  <text x="810" y="185" text-anchor="middle" font-size="10" fill="#2563eb">(real-time sync)</text>

  <!-- Arrow: Firestore to hooks -->
  <line x1="620" y1="200" x2="730" y2="165" stroke="#f97316" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <text x="670" y="170" text-anchor="middle" font-size="10" fill="#f97316" font-weight="600">REAL-TIME</text>
  <text x="670" y="182" text-anchor="middle" font-size="10" fill="#f97316" font-weight="600">UPDATES</text>

  <!-- Dashboard -->
  <rect x="740" y="200" width="140" height="45" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="810" y="220" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Dashboard.tsx</text>
  <text x="810" y="236" text-anchor="middle" font-size="10" fill="#2563eb">filter, section select</text>

  <!-- Arrow hooks to dashboard -->
  <line x1="810" y1="190" x2="810" y2="200" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Components row -->
  <rect x="740" y="258" width="95" height="45" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="787" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">VenueMap</text>
  <text x="787" y="293" text-anchor="middle" font-size="9" fill="#2563eb">Google Maps</text>

  <rect x="845" y="258" width="95" height="45" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="892" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">PoiList</text>
  <text x="892" y="293" text-anchor="middle" font-size="9" fill="#2563eb">filterable list</text>

  <rect x="950" y="258" width="95" height="45" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="997" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">Suggestions</text>
  <text x="997" y="293" text-anchor="middle" font-size="9" fill="#2563eb">nearest clear POI</text>

  <!-- Arrows dashboard to components -->
  <line x1="790" y1="245" x2="787" y2="258" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="830" y1="245" x2="892" y2="258" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="850" y1="245" x2="997" y2="258" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <!-- Google Maps API -->
  <rect x="740" y="318" width="95" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2"/>
  <text x="787" y="336" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">Maps JS API</text>
  <text x="787" y="350" text-anchor="middle" font-size="9" fill="#16a34a">renders map</text>

  <line x1="787" y1="303" x2="787" y2="318" stroke="#22c55e" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- User -->
  <rect x="880" y="318" width="160" height="40" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.2"/>
  <text x="960" y="336" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">User picks section</text>
  <text x="960" y="350" text-anchor="middle" font-size="9" fill="#16a34a">sees distances + suggestions</text>

  <!-- ============ ADMIN FLOW (Bottom) ============ -->
  <text x="500" y="420" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">Admin Override Flow</text>

  <!-- Admin Page -->
  <rect x="720" y="440" width="200" height="55" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="820" y="463" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">/admin page</text>
  <text x="820" y="480" text-anchor="middle" font-size="10" fill="#b91c1c">manual crowd overrides</text>

  <!-- Admin API -->
  <rect x="400" y="440" width="200" height="55" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="500" y="463" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">/api/admin/poi</text>
  <text x="500" y="480" text-anchor="middle" font-size="10" fill="#b91c1c">ADMIN_PASSCODE gated</text>

  <!-- Arrow: admin page to API -->
  <line x1="720" y1="467" x2="610" y2="467" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="665" y="460" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="600">POST</text>

  <!-- Arrow: API to Firestore -->
  <line x1="500" y1="440" x2="500" y2="370" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="520" y="405" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="600">WRITE</text>

  <!-- ============ .env.local ============ -->
  <rect x="30" y="430" width="200" height="80" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="453" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">.env.local</text>
  <text x="130" y="470" text-anchor="middle" font-size="9" fill="#166534">NEXT_PUBLIC_FIREBASE_*</text>
  <text x="130" y="483" text-anchor="middle" font-size="9" fill="#166534">NEXT_PUBLIC_MAPS_KEY</text>
  <text x="130" y="496" text-anchor="middle" font-size="9" fill="#166534">ADMIN_PASSCODE</text>

  <!-- Legend -->
  <rect x="30" y="560" width="1040" height="130" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="550" y="585" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">How It Works</text>

  <circle cx="70" cy="610" r="8" fill="#7c3aed"/>
  <text x="85" y="614" font-size="11" fill="#334155"><tspan font-weight="600">1.</tspan> seed.ts writes venue data to Firestore (one-time setup)</text>

  <circle cx="70" cy="635" r="8" fill="#f97316"/>
  <text x="85" y="639" font-size="11" fill="#334155"><tspan font-weight="600">2.</tspan> simulate.ts updates crowd levels every few seconds (mimics real sensors)</text>

  <circle cx="70" cy="660" r="8" fill="#3b82f6"/>
  <text x="85" y="664" font-size="11" fill="#334155"><tspan font-weight="600">3.</tspan> Browser app uses onSnapshot for real-time Firestore sync - no polling needed</text>

  <circle cx="70" cy="685" r="8" fill="#22c55e"/>
  <text x="85" y="689" font-size="11" fill="#334155"><tspan font-weight="600">4.</tspan> Dashboard renders colored markers on Google Maps + suggestions for nearest clear POI</text>
</svg>
